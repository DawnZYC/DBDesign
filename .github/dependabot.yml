version: 2

updates:
  # Backend Python dependencies.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Frontend npm dependencies.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*", "typescript-eslint"]
      vitest:
        patterns: ["vitest", "@vitest/*", "@testing-library/*"]

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
      include: scope

  # Docker base images.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
