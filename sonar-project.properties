# SonarCloud configuration for the EcoTEA WP1 project.
#
# `sonar.organization` and `sonar.projectKey` MUST be replaced with the values
# shown on https://sonarcloud.io after you import this repository. The defaults
# below assume the GitHub-style key format `<owner>_<repo>`.

sonar.organization=dawnzyc
sonar.projectKey=DawnZYC_DBDesign
sonar.projectName=EcoTEA WP1
sonar.projectVersion=0.1.0

# Source roots — analysed by Sonar.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

# Per-language test inclusion patterns.
sonar.python.version=3.11
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Coverage report paths produced by the CI workflow.
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions: vendored, generated, or non-source files.
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.ts,\
  frontend/src/types.ts

sonar.test.exclusions=\
  **/node_modules/**,\
  **/.venv/**

# Encoding.
sonar.sourceEncoding=UTF-8
