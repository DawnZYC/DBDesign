# Nginx config for the EcoTEA WP1 SPA.
#
# - Serves the Vite production bundle at /
# - Proxies /api/* to the backend service (override BACKEND_HOST at runtime
#   with `-e BACKEND_HOST=http://backend:8000` or via docker compose).
#
# Falls back to index.html for SPA routes (none today, but future-proof).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for hashed assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy: backend at backend:8000 (docker compose service name).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
